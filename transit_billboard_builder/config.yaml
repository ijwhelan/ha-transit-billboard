name: "Transit Billboard Builder"
description: "Generates a BMP image for your ESPHome transit billboard."
version: "1.0.4"
slug: "transit_billboard_builder"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: "services"
map:
  - config:rw
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:train-car
panel_title: Transit Billboard
options:
  k_ingleside_sensor: "sensor.k_ingleside_arrivals"
  _43_masonic_sensor: "sensor.43_masonic_arrivals"
  _23_monterey_sensor: "sensor.23_monterey_arrivals"
  esp_update_service: "esphome.billboard_update_billboard"
  background_image_path: "/config/www/background.bmp"
schema:
  k_ingleside_sensor: "str"
  _43_masonic_sensor: "str"
  _23_monterey_sensor: "str"
  esp_update_service: "str"
  background_image_path: "str"
