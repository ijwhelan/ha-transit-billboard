name: "Transit Billboard Builder"
description: "Generates a BMP image for your ESPHome transit billboard."
version: "1.0.8"
slug: "transit_billboard_builder"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: "services"
map:
  - config:rw
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:train-car
panel_title: Transit Billboard
options:
  esp_update_service: "esphome.billboard_update_billboard"
schema:
  esp_update_service: "str"
